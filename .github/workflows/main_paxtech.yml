name: Build and deploy JAR app to Azure Web App - paxtech

on:
  pull_request:
    branches:
      - main
    paths:
      - "**"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: microsoft
          cache: maven

      - name: Run unit tests
        run: mvn test

  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: microsoft
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: "${{ github.workspace }}/target/*.jar"

  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_82DCE9BB973C4EF4A946BE0C6D46755A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_58428B8490B147DEBDCF0C42023ABB2D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_04DDE365C6E44D9E9C1EE14B6AA76525 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: paxtech
          slot-name: Production
          package: "*.jar"

  # ---------------------------------------------------------------------------
  # 7.4.4 Notification Pipeline Component (+ 7.4.3 Alerting on pipeline failure)
  # Envia un correo via Gmail SMTP con el resultado del pipeline de CI/CD.
  # - Si algun job (test/build/deploy) falla -> correo de ALERTA ("algo esta mal").
  # - Si todo termina OK -> correo de NOTIFICACION informativa del despliegue.
  # Solo se ejecuta en push a main (cuando ocurre el deploy real a produccion).
  # ---------------------------------------------------------------------------
  notify:
    name: Notify pipeline result
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Send FAILURE alert email (Gmail)
        if: ${{ contains(needs.*.result, 'failure') }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: uTime CI/CD <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: "[ALERTA] Pipeline de despliegue FALLO - Web-Services"
          body: |
            Algo esta mal en el pipeline de despliegue del backend uTime.

            Resultado de jobs:
              - test:   ${{ needs.test.result }}
              - build:  ${{ needs.build.result }}
              - deploy: ${{ needs.deploy.result }}

            Commit:      ${{ github.sha }}
            Autor:       ${{ github.actor }}
            Rama:        ${{ github.ref_name }}
            Ver run:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Revisar e investigar la falla antes de continuar.

      - name: Send SUCCESS notification email (Gmail)
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: uTime CI/CD <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: "[OK] Despliegue exitoso a produccion - Web-Services"
          body: |
            El pipeline de CI/CD del backend uTime se ejecuto correctamente y se
            desplego una nueva version a produccion (Azure App Service 'paxtech').

            Resultado de jobs:
              - test:   ${{ needs.test.result }}
              - build:  ${{ needs.build.result }}
              - deploy: ${{ needs.deploy.result }}

            Commit:  ${{ github.sha }}
            Autor:   ${{ github.actor }}
            Rama:    ${{ github.ref_name }}
            Ver run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
