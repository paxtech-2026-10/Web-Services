# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - paxtech

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Build with Maven
        run: mvn clean install

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: '${{ github.workspace }}/target/*.jar'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4AC00B10C3574D4DBECC50094BDD20DF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DD09CBA4309F41DAA7AD840A0939C310 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DD51286FAB6146E0904EA26CFB8B7512 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'paxtech'
          slot-name: 'Production'
          package: '*.jar'

  # ---------------------------------------------------------------------------
  # 7.4.4 Notification Pipeline Component (+ 7.4.3 Alerting on pipeline failure)
  # Envia un correo via Gmail SMTP con el resultado del pipeline de CI/CD.
  # - Si build o deploy falla -> correo de ALERTA ("algo esta mal").
  # - Si todo termina OK -> correo de NOTIFICACION informativa del despliegue.
  # Solo se ejecuta en push a main (cuando ocurre el deploy real a produccion).
  # ---------------------------------------------------------------------------
  notify:
    name: Notify pipeline result
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Send FAILURE alert email (Gmail)
        if: ${{ contains(needs.*.result, 'failure') }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: uTime CI/CD <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: "[ALERTA] Pipeline de despliegue FALLO - Web-Services"
          body: |
            Algo esta mal en el pipeline de despliegue del backend uTime.

            Resultado de jobs:
              - build:  ${{ needs.build.result }}
              - deploy: ${{ needs.deploy.result }}

            Commit:      ${{ github.sha }}
            Autor:       ${{ github.actor }}
            Rama:        ${{ github.ref_name }}
            Ver run:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Revisar e investigar la falla antes de continuar.

      - name: Send SUCCESS notification email (Gmail)
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: uTime CI/CD <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: "[OK] Despliegue exitoso a produccion - Web-Services"
          body: |
            El pipeline de CI/CD del backend uTime se ejecuto correctamente y se
            desplego una nueva version a produccion (Azure App Service 'paxtech').

            Resultado de jobs:
              - build:  ${{ needs.build.result }}
              - deploy: ${{ needs.deploy.result }}

            Commit:  ${{ github.sha }}
            Autor:   ${{ github.actor }}
            Rama:    ${{ github.ref_name }}
            Ver run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
