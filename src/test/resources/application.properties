spring.profiles.active=test

spring.application.name=Web Services Platform
server.port=8080

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=USER,VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.naming.physical-strategy=com.paxtech.utime.platform.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

documentation.application.description=Test
documentation.application.version=0.0.1-SNAPSHOT

authorization.jwt.secret=test-jwt-secret-key-for-integration-tests-must-be-at-least-32-chars
authorization.jwt.expiration.days=7

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

storage.supabase.url=http://localhost:54321
storage.supabase.bucket=profiles
storage.supabase.service-role-key=local-test-service-role-key

stripe.secret-key=sk_test_local_placeholder
stripe.webhook-secret=whsec_local_placeholder

logging.level.root=WARN
