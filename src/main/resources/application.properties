# Common Spring Boot configuration.
# Profile-specific settings live in application-dev.properties and application-prod.properties.

spring.application.name=Web Services Platform
spring.profiles.default=dev

server.port=${PORT:8080}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=com.paxtech.utime.platform.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

spring.flyway.enabled=false

documentation.application.description=@project.description@
documentation.application.version=@project.version@

authorization.jwt.expiration.days=${JWT_EXPIRATION_DAYS:7}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

logging.level.root=INFO
