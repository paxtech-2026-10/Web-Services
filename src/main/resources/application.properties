# Spring Application Name
spring.application.name=Web Services Platform

# Server Port Configuration
server.port=${PORT:8080}

# Spring DataSource Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DATASOURCE_URL}

# Spring Data JPA Configuration
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=com.paxtech.utime.platform.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Application Information for Documentation
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# JWT Configuration Properties
authorization.jwt.secret=${JWT_SECRET}
authorization.jwt.expiration.days=${JWT_EXPIRATION_DAYS:7}

# Flyway Configuration
# spring.flyway.enabled=${FLYWAY_ENABLED:false}

# Supabase REST API Configuration
storage.supabase.url=${SUPABASE_URL}
storage.supabase.bucket=${SUPABASE_BUCKET}
storage.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}

# Multipart File Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Stripe Configuration
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}

# Logging Configuration
logging.file.name=${LOGGING_FILE_NAME:/home/LogFiles/Application/app.log}
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}

#update