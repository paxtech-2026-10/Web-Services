<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>uTime · Panel de Analíticas</title>
<style>
  :root{
    --plane:#f4f4f2; --surface:#ffffff; --ink:#0b0b0b; --ink-2:#52514e; --muted:#898781;
    --grid:#e1e0d9; --baseline:#c3c2b7; --border:rgba(11,11,11,.10);
    --brand:#7209B7;
    --client:#4a3aa7; --provider:#1baf7a; --anon:#eda100;
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--plane); color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1120px; margin:0 auto; padding:28px 20px 56px}

  header.top{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:24px}
  .brand{display:flex; align-items:center; gap:12px}
  .logo{width:40px; height:40px; border-radius:11px; background:var(--brand);
    display:grid; place-items:center; color:#fff; font-weight:800; font-size:20px}
  h1{font-size:22px; margin:0; letter-spacing:-.2px}
  .sub{color:var(--ink-2); font-size:13.5px; margin-top:2px}
  .meta{display:flex; align-items:center; gap:10px; color:var(--muted); font-size:12.5px}
  button.refresh{
    border:1px solid var(--border); background:var(--surface); color:var(--ink);
    border-radius:10px; padding:8px 14px; font:inherit; font-size:13px; font-weight:600; cursor:pointer;
  }
  button.refresh:hover{background:#faf9f8}

  .kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    box-shadow:0 1px 2px rgba(11,11,11,.04)}
  .kpi{padding:18px 18px 16px}
  .kpi .label{color:var(--ink-2); font-size:12.5px; font-weight:600; text-transform:uppercase; letter-spacing:.4px}
  .kpi .value{font-size:34px; font-weight:800; margin-top:6px; letter-spacing:-1px}
  .kpi .hint{color:var(--muted); font-size:12px; margin-top:2px}

  .grid2{display:grid; grid-template-columns:1.7fr 1fr; gap:14px; margin-bottom:20px}
  .panel{padding:20px}
  .panel h2{font-size:15px; margin:0 0 2px}
  .panel .psub{color:var(--muted); font-size:12.5px; margin-bottom:16px}

  /* Barras apiladas por tipo de evento */
  .barrow{display:grid; grid-template-columns:150px 1fr 44px; align-items:center; gap:12px; margin:9px 0}
  .barrow .name{font-size:12.5px; color:var(--ink-2); text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .track{height:20px; background:#f1f0ec; border-radius:6px; overflow:hidden; display:flex}
  .seg{height:100%; margin-right:2px}
  .seg:last-child{margin-right:0}
  .seg:first-child{border-radius:6px 0 0 6px}
  .barrow .tot{font-size:13px; font-weight:700; font-variant-numeric:tabular-nums}

  .legend{display:flex; gap:16px; flex-wrap:wrap; margin-top:18px; padding-top:14px; border-top:1px solid var(--grid)}
  .legend .item{display:flex; align-items:center; gap:7px; font-size:12.5px; color:var(--ink-2)}
  .sw{width:11px; height:11px; border-radius:3px; flex:none}
  .legend b{color:var(--ink); font-variant-numeric:tabular-nums}

  /* Dona */
  .donutwrap{display:flex; flex-direction:column; align-items:center; gap:14px}
  .donut{position:relative; width:168px; height:168px; border-radius:50%}
  .donut .hole{position:absolute; inset:26px; background:var(--surface); border-radius:50%;
    display:grid; place-items:center; text-align:center}
  .donut .hole .n{font-size:26px; font-weight:800; letter-spacing:-.5px}
  .donut .hole .t{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px}
  .dlegend{width:100%; display:flex; flex-direction:column; gap:8px}
  .dlegend .row{display:flex; align-items:center; gap:8px; font-size:13px}
  .dlegend .row .pct{margin-left:auto; color:var(--ink-2); font-variant-numeric:tabular-nums}

  /* Tabla */
  table{width:100%; border-collapse:collapse; font-size:13px}
  thead th{text-align:left; color:var(--muted); font-weight:600; font-size:11.5px; text-transform:uppercase;
    letter-spacing:.4px; padding:0 12px 10px; border-bottom:1px solid var(--grid)}
  tbody td{padding:11px 12px; border-bottom:1px solid var(--grid); vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  td.time{color:var(--ink-2); font-variant-numeric:tabular-nums; white-space:nowrap}
  .tag{display:inline-block; padding:3px 9px; border-radius:999px; font-size:12px; font-weight:600}
  .chip{display:inline-block; padding:2px 8px; border-radius:6px; background:#f1f0ec; color:var(--ink-2);
    font-size:11.5px; margin:1px 3px 1px 0; font-variant-numeric:tabular-nums}
  .actor-dot{width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:6px; vertical-align:middle}

  .empty{padding:60px 20px; text-align:center; color:var(--muted)}
  .err{padding:14px 18px; border-radius:12px; background:#fdeceb; color:#b00020; font-size:13.5px; border:1px solid #f6c9c6}

  @media (max-width:820px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .grid2{grid-template-columns:1fr}
    .barrow{grid-template-columns:110px 1fr 40px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="logo">u</div>
      <div>
        <h1>Panel de Analíticas</h1>
        <div class="sub">uTime · eventos del experimento (UE01–UE05)</div>
      </div>
    </div>
    <div class="meta">
      <span id="updated">—</span>
      <button class="refresh" id="refreshBtn">Actualizar</button>
    </div>
  </header>

  <div id="error"></div>

  <section class="kpis" id="kpis"></section>

  <div class="grid2">
    <div class="card panel">
      <h2>Eventos por tipo</h2>
      <div class="psub">Longitud = total · color = actor que disparó el evento</div>
      <div id="bars"></div>
      <div class="legend" id="barlegend"></div>
    </div>
    <div class="card panel">
      <h2>Distribución por actor</h2>
      <div class="psub">Quién genera la actividad</div>
      <div class="donutwrap">
        <div class="donut" id="donut"><div class="hole"><div><div class="n" id="donutTotal">0</div><div class="t">eventos</div></div></div></div>
        <div class="dlegend" id="dlegend"></div>
      </div>
    </div>
  </div>

  <div class="card panel">
    <h2>Eventos recientes</h2>
    <div class="psub" id="tblsub">Últimos eventos registrados</div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Fecha / hora</th><th>Evento</th><th>Actor</th><th>Salón</th><th>Metadata</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const ACTORS = [
  { key:"CLIENT",    label:"Cliente",   field:"clientCount",    color:"var(--client)"   },
  { key:"PROVIDER",  label:"Proveedor", field:"providerCount",  color:"var(--provider)" },
  { key:"ANONYMOUS", label:"Anónimo",   field:"anonymousCount", color:"var(--anon)"     },
];
const ACTOR_COLOR = { CLIENT:"var(--client)", PROVIDER:"var(--provider)", ANONYMOUS:"var(--anon)" };
const ACTOR_LABEL = { CLIENT:"Cliente", PROVIDER:"Proveedor", ANONYMOUS:"Anónimo" };

const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const pretty = e => String(e||"").replace(/_/g," ").replace(/^\w/, c => c.toUpperCase());

function fmtDate(iso){
  if(!iso) return "—";
  const d = new Date(iso);
  if(isNaN(d)) return iso;
  return d.toLocaleString("es-PE", { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" });
}

async function load(){
  $("error").innerHTML = "";
  try{
    const [sumR, evR] = await Promise.all([
      fetch("/api/v1/analytics/summary"),
      fetch("/api/v1/analytics/events")
    ]);
    if(!sumR.ok) throw new Error("No se pudo cargar el resumen ("+sumR.status+")");
    const summary = await sumR.json();
    const events = evR.ok ? await evR.json() : [];
    render(summary, events);
    $("updated").textContent = "Actualizado " + new Date().toLocaleTimeString("es-PE",{hour:"2-digit",minute:"2-digit"});
  }catch(err){
    $("error").innerHTML = '<div class="err">'+esc(err.message)+'</div>';
  }
}

function render(s, events){
  // ---- KPIs ----
  const kpis = [
    { label:"Total eventos",  value:(s.totalEvents||0).toLocaleString("es-PE"), hint:"registrados" },
    { label:"Actores únicos", value:(s.distinctActors||0).toLocaleString("es-PE"), hint:"clientes + proveedores" },
    { label:"Tipos de evento",value:(s.byEventType?.length||0), hint:"distintos" },
    { label:"Último evento",  value:fmtDate(s.lastEventAt).split(",")[0]||"—", hint:s.lastEventAt?("desde "+fmtDate(s.firstEventAt).split(",")[0]):"sin datos" },
  ];
  $("kpis").innerHTML = kpis.map(k =>
    '<div class="card kpi"><div class="label">'+k.label+'</div><div class="value">'+k.value+'</div><div class="hint">'+esc(k.hint)+'</div></div>'
  ).join("");

  const byType = (s.byEventType||[]).slice().sort((a,b)=>b.total-a.total);
  const empty = !byType.length;

  // ---- Barras apiladas ----
  if(empty){
    $("bars").innerHTML = '<div class="empty">Aún no hay eventos registrados.</div>';
  } else {
    const max = Math.max(...byType.map(t=>t.total), 1);
    $("bars").innerHTML = byType.map(t=>{
      const segs = ACTORS.map(a=>{
        const c = t[a.field]||0;
        if(!c) return "";
        const w = (c/max*100);
        return '<div class="seg" style="width:'+w+'%;background:'+a.color+'" title="'+esc(pretty(t.eventType))+' · '+a.label+': '+c+'"></div>';
      }).join("");
      return '<div class="barrow"><div class="name" title="'+esc(t.eventType)+'">'+esc(pretty(t.eventType))+'</div>'
        + '<div class="track">'+segs+'</div><div class="tot">'+t.total+'</div></div>';
    }).join("");
  }
  const actorTotals = {};
  ACTORS.forEach(a => actorTotals[a.key] = byType.reduce((n,t)=>n+(t[a.field]||0),0));
  $("barlegend").innerHTML = ACTORS.map(a =>
    '<span class="item"><span class="sw" style="background:'+a.color+'"></span>'+a.label+' <b>'+(actorTotals[a.key]||0)+'</b></span>'
  ).join("");

  // ---- Dona por actor ----
  const byActor = (s.byActorType||[]);
  const total = byActor.reduce((n,a)=>n+(a.total||0),0);
  $("donutTotal").textContent = total.toLocaleString("es-PE");
  if(total>0){
    let acc = 0; const stops = [];
    // orden fijo por entidad (no por rank) para que el color siga al actor
    const ordered = ["CLIENT","PROVIDER","ANONYMOUS"].map(k => byActor.find(a=>a.actorType===k)).filter(Boolean);
    ordered.forEach(a=>{
      const start = acc/total*100, end = (acc+a.total)/total*100; acc += a.total;
      stops.push(ACTOR_COLOR[a.actorType]+" "+start+"% "+end+"%");
    });
    $("donut").style.background = "conic-gradient("+stops.join(",")+")";
    $("dlegend").innerHTML = ordered.map(a=>{
      const pct = Math.round(a.total/total*100);
      return '<div class="row"><span class="sw" style="background:'+ACTOR_COLOR[a.actorType]+'"></span>'
        + (ACTOR_LABEL[a.actorType]||a.actorType)+'<span class="pct"><b>'+a.total+'</b> · '+pct+'%</span></div>';
    }).join("");
  } else {
    $("donut").style.background = "#f1f0ec";
    $("dlegend").innerHTML = "";
  }

  // ---- Tabla eventos recientes ----
  const rows = (events||[]).slice(0, 30);
  $("tblsub").textContent = rows.length ? ("Últimos "+rows.length+" eventos registrados") : "Sin eventos";
  $("rows").innerHTML = rows.map(e=>{
    const color = ACTOR_COLOR[e.actorType] || "var(--muted)";
    const meta = e.metadata && Object.keys(e.metadata).length
      ? Object.entries(e.metadata).map(([k,v])=>'<span class="chip">'+esc(k)+': '+esc(v)+'</span>').join("")
      : '<span style="color:var(--muted)">—</span>';
    const actor = '<span class="actor-dot" style="background:'+color+'"></span>'+(ACTOR_LABEL[e.actorType]||e.actorType)
      + (e.actorId!=null ? ' <span style="color:var(--muted)">#'+e.actorId+'</span>' : '');
    return '<tr><td class="time">'+fmtDate(e.occurredAt)+'</td>'
      + '<td><span class="tag" style="background:rgba(114,9,183,.08);color:var(--brand)">'+esc(pretty(e.eventType))+'</span></td>'
      + '<td>'+actor+'</td>'
      + '<td>'+(e.providerId!=null ? '#'+e.providerId : '<span style="color:var(--muted)">—</span>')+'</td>'
      + '<td>'+meta+'</td></tr>';
  }).join("") || '<tr><td colspan="5" class="empty">Sin eventos</td></tr>';
}

$("refreshBtn").addEventListener("click", load);
load();
setInterval(load, 60000);
</script>
</body>
</html>
