# Production configuration.
# Activate with SPRING_PROFILES_ACTIVE=prod or --spring.profiles.active=prod.
# Do not commit production secrets. Provide all values through environment variables.

spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

authorization.jwt.secret=${JWT_SECRET}

storage.supabase.url=${SUPABASE_URL}
storage.supabase.bucket=${SUPABASE_BUCKET}
storage.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}

stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}

logging.file.name=${LOGGING_FILE_NAME:/home/LogFiles/Application/app.log}
