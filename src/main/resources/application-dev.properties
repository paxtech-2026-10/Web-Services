# Local development configuration.
# Starts by default because application.properties sets spring.profiles.default=dev.

spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/utime_dev}
spring.datasource.username=${DATASOURCE_USERNAME:postgres}
spring.datasource.password=${DATASOURCE_PASSWORD:2808}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

authorization.jwt.secret=${JWT_SECRET:local-development-jwt-secret-key-change-me-1234567890}

# Dummy local values. Real network calls only happen when upload/payment flows are used.
storage.supabase.url=${SUPABASE_URL:http://localhost:54321}
storage.supabase.bucket=${SUPABASE_BUCKET:profiles}
storage.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:local-development-service-role-key}

stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_local_development_placeholder}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_local_development_placeholder}
